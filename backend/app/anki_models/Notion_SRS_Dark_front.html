<div class="card-container">
  <div class="header">
    {{#Category}}<span class="category-pill">{{Category}}</span>{{/Category}}
    {{#Tags}}<span class="tags-pill">{{Tags}}</span>{{/Tags}}
  </div>
  
  <div class="prompt-section">
    <h1>{{Prompt}}</h1>
  </div>
  
  <div class="footer">
    {{#NotionURL}}
      <a href="{{NotionURL}}" class="notion-btn" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" class="notion-icon"><path d="M4.459 4.208c.746 0 1.636.568 2.392 1.543l9.462 13.064c.266.38.647.498 1.05.498.812 0 1.543-.593 2.112-1.464V4.208h-2.112V3h4.639v1.208h-1.394v15.584h-1.127l-9.845-13.633c-.27-.406-.677-.498-1.047-.498-.823 0-1.576.602-2.13 1.485v13.633h2.13V21H4V19.792h1.414V4.208H4.459z" /></svg>
        Open in Notion
      </a>
    {{/NotionURL}}
  </div>
</div>
