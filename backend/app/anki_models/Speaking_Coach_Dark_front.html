<div class="card front-card">
    <!-- 對方的發言 (翻面後依舊保留) -->
    <div class="expression-box">
        <div class="topic-tag">🗣️ 對方 (Partner)</div>
        <div class="prompt-content">{{Prompt}}</div>
        <!-- 語音頭像列 (由 JS 渲染) -->
        <div id="prompt-avatars" class="avatar-row"></div>
    </div>

    <!-- 文脈 (翻面後會被替換成解答區塊) -->
    <div class="section context-section">
        <div class="section-title">📖 文脈 (Context)</div>
        <div class="section-content">{{Context}}</div>
    </div>
</div>

<!-- 隱藏欄位供 JS 解析 -->
<div id="prompt-audios-data" style="display:none;">{{Prompt_Audios}}</div>
<div id="card-id-data" style="display:none;">{{Card_ID}}</div>
<div id="tg-bot-data" style="display:none;">{{TG_Bot}}</div>

<script>
// ============================
// 共用：音訊播放控制
// ============================
var _scCurrentAudio = null;
var _scActiveBtn = null;

function scPlayAudio(filename, btn) {
    // 阻止 Anki 翻面
    if (event) { event.stopPropagation(); event.preventDefault(); }

    // 如果點擊的是正在播放的同一個按鈕，停止播放
    if (_scCurrentAudio && _scActiveBtn === btn) {
        _scCurrentAudio.pause();
        _scCurrentAudio.currentTime = 0;
        _scCurrentAudio = null;
        btn.classList.remove('playing');
        _scActiveBtn = null;
        return;
    }

    // 停止上一個
    if (_scCurrentAudio) {
        _scCurrentAudio.pause();
        _scCurrentAudio.currentTime = 0;
        if (_scActiveBtn) _scActiveBtn.classList.remove('playing');
    }

    var audio = new Audio(filename);
    _scCurrentAudio = audio;
    _scActiveBtn = btn;
    btn.classList.add('playing');

    audio.onended = function() {
        btn.classList.remove('playing');
        _scCurrentAudio = null;
        _scActiveBtn = null;
    };
    audio.onerror = function() {
        btn.classList.remove('playing');
        _scCurrentAudio = null;
        _scActiveBtn = null;
    };
    audio.play();
}

// ============================
// 共用：建立頭像播放按鈕
// ============================
function scCreateAvatarBtn(item, index) {
    var btn = document.createElement('div');
    btn.className = 'avatar-btn';
    btn.title = item.speaker || '';
    btn.onclick = function(e) { scPlayAudio(item.audio, btn); };

    if (item.avatar) {
        var img = document.createElement('img');
        img.src = item.avatar;
        img.alt = item.speaker || 'voice';
        btn.appendChild(img);
    } else {
        btn.innerHTML = '<span class="avatar-icon">▶</span>';
    }
    return btn;
}

// ============================
// 共用：建立 Telegram「+」按鈕
// ============================
function scCreateTgBtn(section, index) {
    var cardId = (document.getElementById('card-id-data').textContent || '').trim();
    var tgBot = (document.getElementById('tg-bot-data').textContent || '').trim();
    if (!tgBot) return null;

    var param = section + '_' + encodeURIComponent(cardId);
    if (typeof index !== 'undefined' && index !== null) {
        param = section + '_' + index + '_' + encodeURIComponent(cardId);
    }
    var deepLink = 'https://t.me/' + tgBot + '?start=' + param;

    var btn = document.createElement('a');
    btn.className = 'avatar-btn tg-add-btn';
    btn.href = deepLink;
    btn.title = '透過 Telegram 提交修改請求';
    btn.onclick = function(e) { e.stopPropagation(); };
    btn.innerHTML = '<span class="avatar-icon">＋</span>';
    return btn;
}

// ============================
// 渲染 Prompt 語音頭像列
// ============================
(function() {
    var raw = (document.getElementById('prompt-audios-data').textContent || '').trim();
    var audios = [];
    try { audios = JSON.parse(raw); } catch(e) { audios = []; }

    var container = document.getElementById('prompt-avatars');
    if (!container) return;

    if (audios && audios.length > 0) {
        for (var i = 0; i < audios.length; i++) {
            container.appendChild(scCreateAvatarBtn(audios[i], i));
        }
    }

    var tgBtn = scCreateTgBtn('prompt', null);
    if (tgBtn) container.appendChild(tgBtn);
})();
</script>
