server {
    listen 80;
    server_name localhost;
    # ==========================================
    # 1. 靜態資源壓縮優化
    # ==========================================
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    # ==========================================
    # 2. 前端 React 靜態檔案與 SPA 路由
    # ==========================================
    location / {
        root   /usr/share/nginx/FluencyTides;
        index  index.html index.htm;

        # 關鍵：若找不到對應的路徑，一律回傳 index.html 交給前端 React 路由處理
        try_files $uri $uri/ /index.html;
    }
    # ==========================================
    # 3. 後端 FastAPI 反向代理
    # ==========================================
    location /api/ {
        # 使用 Docker 內部網路解析後端容器名稱，徹底解決所有防火牆/Hairpin NAT 問題
        proxy_pass http://fluencytides-backend:8000;

        # 將使用者的真實 IP 和 Host 資訊傳遞給後端（後端 log 才看得到真實來源）
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # (可選) 避免上傳較大的媒體檔案或語音檔時被 Nginx 擋掉，可調大上傳限制
        client_max_body_size 50M;
    }
}